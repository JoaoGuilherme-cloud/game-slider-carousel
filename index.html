<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Games</title>
</head>
<body>
    <main>
        <div class="item active" style="--background: rgba(41, 39, 71, 0.938)">
            <div class="title">Hollow Knight</div>
            <img src="./imgs/hollow-Photoroom.png" class="games">

        </div>

        <div class="item" style="--background: rgba(25, 115, 218, 0.918)">
            <div class="title">Celeste</div>
            <img src="./imgs/celeste-Photoroom.png" class="games">

        </div>

        <div class="item" style="--background: rgb(243, 186, 0)">
            <div class="title">Cuphead</div>
            <img src="./imgs/cup-Photoroom.png" class="games">

        </div>

        <div class="item" style="--background: rgb(172, 27, 79)">
            <div class="title">Dead Cells</div>
            <img src="./imgs/transparentedead.png" class="games">

        </div>

        <div class="item" style="--background: linear-gradient(to bottom right, #ffd000, #ff2da0)">
            <div class="title">Hotline Miami</div>
            <img src="./imgs/hotline-Photoroom.png" class="games">

        </div>

        <div class="arrow">
            <button id="prev"> < </button>
            <button id="next"> > </button>

        </div>
    </main>
</body>

<script src="./scripts.js"></script>
</html>
